# ============================================================
# AI Prompt Poisoning Detector - Application Configuration
# ============================================================

spring.application.name=prompt-poison-detector
server.port=8080

# ---------------------------------------------------------------
# H2 In-Memory Database (default dev profile)
# ---------------------------------------------------------------
spring.datasource.url=jdbc:h2:mem:promptguarddb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---------------------------------------------------------------
# PostgreSQL (uncomment and fill in for production)
# ---------------------------------------------------------------
# spring.datasource.url=jdbc:postgresql://localhost:5432/promptguarddb
# spring.datasource.driver-class-name=org.postgresql.Driver
# spring.datasource.username=your_user
# spring.datasource.password=your_password
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ---------------------------------------------------------------
# JPA / Hibernate
# ---------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ---------------------------------------------------------------
# OpenAI Configuration
# Set OPENAI_API_KEY env variable OR replace placeholder below.
# ---------------------------------------------------------------
openai.api.key=${OPENAI_API_KEY:YOUR_OPENAI_API_KEY_HERE}
openai.api.url=https://api.openai.com/v1/chat/completions
openai.model=gpt-4o-mini
openai.max-tokens=800
openai.temperature=0.1

# ---------------------------------------------------------------
# Risk Score Weights (must sum to 100)
# ---------------------------------------------------------------
risk.weight.instruction-override=25
risk.weight.role-escalation=20
risk.weight.prompt-injection=25
risk.weight.hidden-trigger=15
risk.weight.data-extraction=15

# ---------------------------------------------------------------
# Logging
# ---------------------------------------------------------------
logging.level.com.promptguard=DEBUG
logging.level.org.springframework.web=INFO

# ---------------------------------------------------------------
# SpringDoc / Swagger
# ---------------------------------------------------------------
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
